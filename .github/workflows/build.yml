name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config cmake \
            libffi-dev libssl-dev
          pip install buildozer cython==0.29.33

      - name: Install NDK 25b
        run: |
          echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          PIP_NO_BINARY: zstandard
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            /usr/local/lib/android/sdk/tools/bin/sdkmanager
          sudo ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/avdmanager \
            /usr/local/lib/android/sdk/tools/bin/avdmanager
          buildozer -v android debug 2>&1 | tee buildozer_full.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_full.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghoststore-debug.apk
          path: bin/
